spring:
  application:
    name: billing-os

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:billingos}
    username: ${DB_USER:billingos}
    password: ${DB_PASS:billingos}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        default_schema: invoicing

  flyway:
    enabled: true
    schemas: invoicing
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-min-32-chars-long}
    expiration-ms: 86400000  # 24h

  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: ${MINIO_BUCKET:billingos}

  admin:
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD:admin123}

  dte:
    mh-api-url: ${MH_API_URL:https://apidte.mh.gob.sv}
    mh-api-path: ${MH_API_PATH:/api/fesv/recepciondte}
    max-retry-attempts: ${DTE_MAX_RETRIES:5}
    retry-base-delay-seconds: ${DTE_RETRY_BASE_DELAY:30}
    transmission-cron: ${DTE_CRON:*/5 * * * * *}
    certificate-password: ${DTE_CERTIFICATE_PASSWORD:}

logging:
  level:
    com.billingos: INFO
    org.springframework.security: WARN
