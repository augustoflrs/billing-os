spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/billingos
    username: billingos
    password: billingos

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: invoicing

  flyway:
    enabled: true
    schemas: invoicing
    locations: classpath:db/migration

app:
  jwt:
    secret: test-secret-key-must-be-at-least-32-characters-long
    expiration-ms: 3600000

  minio:
    endpoint: http://localhost:9000
    access-key: minioadmin
    secret-key: minioadmin
    bucket: billingos-test
